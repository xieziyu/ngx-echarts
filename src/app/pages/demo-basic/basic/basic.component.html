<div class="demo-layout">
  <nav class="demo-sidebar">
    @for (tab of tabs; track tab.label; let i = $index) {
      <button [class.active]="selectedIndex() === i" (click)="selectedIndex.set(i)">
        {{ tab.label }}
      </button>
    }
  </nav>
  <div class="demo-content">
    @switch (selectedIndex()) {
      @case (0) {
        <app-basic-simple />
      }
      @case (1) {
        <app-basic-dataset />
      }
      @case (2) {
        <app-basic-events />
      }
      @case (3) {
        <app-basic-themes />
      }
      @case (4) {
        <app-basic-loading />
      }
      @case (5) {
        <app-basic-update />
      }
      @case (6) {
        <app-basic-init-opts />
      }
      @case (7) {
        <app-basic-instance />
      }
    }
  </div>
</div>
