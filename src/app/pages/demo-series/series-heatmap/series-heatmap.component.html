<div class="demo-layout">
  <nav class="demo-sidebar">
    @for (tab of tabs; track tab.label; let i = $index) {
      <button [class.active]="selectedIndex() === i" (click)="selectedIndex.set(i)">
        {{ tab.label }}
      </button>
    }
  </nav>
  <div class="demo-content">
    @switch (selectedIndex()) {
      @case (0) {
        <app-heatmap-calendar />
      }
      @case (1) {
        <app-heatmap-discrete />
      }
    }
  </div>
</div>
